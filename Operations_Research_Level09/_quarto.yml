project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    - report_web.qmd

website:
  title: "Operations Research – Level 9"

  site-url: "https://leobayer.github.io/Wissenschaftliche-Arbeiten/Operations_Research_Level09/"

  navbar:
    background: primary
    left:
      - href: index.qmd
        text: Start
      - href: report_web.qmd
        text: Interaktive Analyse
    right:
      - href: report.pdf
        text: PDF-Ausarbeitung
      - href: "https://github.com/LeoBayer/Wissenschaftliche-Arbeiten/tree/main/Operations_Research_Level09"
        text: Quellcode

  page-footer:
    left: "Operations Research, Sommersemester 2026"
    right: "Gruppe 42"

execute:
  freeze: auto
  cache: false
  echo: false
  warning: false
  error: false

format:
  html:
    theme:
      light: cosmo
      dark: darkly

    css: styles.css

    toc: true
    toc-depth: 3
    toc-location: left

    code-fold: true
    code-summary: "Python-Code anzeigen"
    code-tools: true

    smooth-scroll: true
    number-sections: true

    fig-align: center
    fig-width: 8
    fig-height: 6

jupyter: or-level9
