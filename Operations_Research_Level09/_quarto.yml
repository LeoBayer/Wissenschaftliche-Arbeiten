project:
  type: website
  output-dir: docs
  render:
    - index.qmd

website:
  title: "Operations Research – Level 9"
  site-url: "https://DEIN-GITHUB-NAME.github.io/DEIN-REPOSITORY/"
  navbar:
    background: primary
    left:
      - href: index.qmd
        text: Interaktive Analyse
    right:
      - href: report.pdf
        text: PDF-Ausarbeitung

  page-footer:
    left: "Operations Research, Sommersemester 2026"
